<!DOCTYPE html>
<html lang="en" ng-app="travelApp">
<head>
  <meta charset="UTF-8">
  <title>Transport Search</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/transport.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-animate.min.js"></script>
</head>
<body ng-controller="TransportController as vm" class="bg-light" animate-on-load>

  <header class="bg-primary text-white text-center py-4 mb-4">
    <h1>BookNGo</h1>
    <nav class="mt-2">
      <a href="tourbook.html" class="btn btn-outline-light btn-sm me-2">Tour Info</a>
      <a href="booking.html" class="btn btn-outline-light btn-sm me-2">Booking</a>
      <a href="transport.html" class="btn btn-light btn-sm me-2">Transport</a>
    </nav>
  </header>

  <div class="container">
    <div class="card p-4 shadow-sm mb-4 search-form">
      <h4 class="mb-3">Search Transport</h4>
      <div class="row g-3">
        <div class="col-md-4">
          <input type="text" ng-model="vm.search.from" class="form-control" placeholder="From (e.g., Delhi, Chennai)">
        </div>
        <div class="col-md-4">
          <input type="text" ng-model="vm.search.to" class="form-control" placeholder="To (e.g., Agra, Mumbai)">
        </div>
        <div class="col-md-2">
          <select ng-model="vm.filterType" class="form-select" ng-class="{'filter-change': vm.filterType}">
            <option value="">All</option>
            <option value="bus">Bus</option>
            <option value="train">Train</option>
          </select>
        </div>
        <div class="col-md-2 d-grid">
          <button class="btn btn-primary" ng-click="vm.findTransport()">Search</button>
        </div>
      </div>
    </div>

    <div class="row g-4" ng-show="vm.results.length > 0">
      <transport-card
        class="col-md-4 fade-in transport-card"
        ng-repeat="t in vm.results | typeFilter:vm.filterType track by $index"
        data="t">
      </transport-card>
    </div>
    
    <div class="text-center mt-4 no-results" ng-show="vm.results.length === 0 && (vm.search.from || vm.search.to)">
      <div class="alert alert-info">
        <h5>No transport options found</h5>
        <p>Try searching for routes like Delhi to Agra, Delhi to Mumbai, or Chennai to Bangalore.</p>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/transport.js"></script>
</body>
</html>
