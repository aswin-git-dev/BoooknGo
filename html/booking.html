<!DOCTYPE html>
<html lang="en" ng-app="travelApp">
<head>
  <meta charset="UTF-8">
  <title>Hotel Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/booking.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-animate.min.js"></script>
</head>
<body ng-controller="HotelController as vm" class="bg-light" animate-on-load>

  <header class="bg-primary text-white text-center py-4 mb-4">
    <h1>BookNGo</h1>
    <nav class="mt-2">
      <a href="tourbook.html" class="btn btn-outline-light btn-sm me-2">Tour Info</a>
      <a href="booking.html" class="btn btn-outline-light btn-sm me-2">Booking</a>
      <a href="transport.html" class="btn btn-outline-light btn-sm me-2">Transport</a>
    </nav>
  </header>

  <div class="container">
    <div class="card p-4 shadow-sm mb-4 search-form">
      <h4 class="mb-3">Search Hotels</h4>
      <div class="row g-3">
        <div class="col-md-4">
          <input type="text" ng-model="vm.search.city" class="form-control" placeholder="Enter City">
        </div>
        <div class="col-md-3">
          <input type="date" ng-model="vm.search.date" class="form-control">
        </div>
        <div class="col-md-3">
          <select ng-model="vm.starFilter" class="form-select">
            <option value="">All Stars</option>
            <option value="5">5 Star</option>
            <option value="4">4 Star</option>
            <option value="3">3 Star</option>
          </select>
        </div>
        <div class="col-md-2 d-grid">
          <button class="btn btn-primary" ng-click="vm.findHotels()">Search</button>
        </div>
      </div>
    </div>

    <div class="row g-4" ng-show="vm.hotels.length > 0">
      <hotel-card
        class="col-md-4 fade-in hotel-card"
        ng-repeat="h in vm.hotels | starFilter:vm.starFilter track by $index"
        data="h">
      </hotel-card>
    </div>
    
    <div class="text-center mt-4 no-results" ng-show="vm.hotels.length === 0 && vm.search.city">
      <div class="alert alert-info">
        <h5>No hotels found</h5>
        <p>Try searching for a different city like Delhi, Agra, or Jaipur.</p>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/booking.js"></script>
</body>
</html>
